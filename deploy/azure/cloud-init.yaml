#cloud-config
# NOTE: OPTIONAL reference only — NOT used by the default deployment.
# main.bicep / azuredeploy.json provision a WINDOWS VM and run setup.ps1; they do
# not reference this file. To use it, pass it as custom-data to your own Ubuntu VM
# and substitute __ADMIN_USERNAME__, __FOUNDRY_ENDPOINT__, and __FOUNDRY_DEPLOYMENT__
# (for example with sed) before deployment.
#
# Provisions an Ubuntu 24.04 VM as a VNet-integrated workstation for the
# OFFICIAL Oracle -> Azure Database for PostgreSQL schema conversion feature.
#
# It installs desktop Visual Studio Code + the Microsoft PostgreSQL extension
# (ms-ossdata.vscode-pgsql), which runs the Migration Wizard and performs the
# AI conversion via Microsoft Foundry, validated against your scratch database.
# No conversion logic runs on this VM — it only hosts VS Code inside the
# virtual network that can reach a privately networked Oracle source.
#
# Installed:
#   - Visual Studio Code (desktop) + PostgreSQL extension + GitHub Copilot
#   - A lightweight XFCE desktop + xrdp, reached privately over Azure Bastion
#   - Oracle Instant Client 21 (thick client mode, for native net encryption)
#   - Azure CLI (az sign-in for Microsoft Entra ID / Foundry)
#
# Access: connect over Azure Bastion via an RDP tunnel (port 3389). The login
# password is set at deploy time; no SSH and no public ports are opened.

package_update: true
package_upgrade: true

packages:
  - curl
  - wget
  - gnupg
  - unzip
  - ca-certificates
  - apt-transport-https
  - software-properties-common
  - libaio1t64
  - xfce4
  - xfce4-goodies
  - xrdp
  - dbus-x11

write_files:
  - path: /etc/oracle-workstation/env
    permissions: '0644'
    content: |
      # Convenience values for the Migration Wizard. The PostgreSQL extension
      # also prompts for these interactively. Filled at deploy time by main.bicep.
      FOUNDRY_ENDPOINT=__FOUNDRY_ENDPOINT__
      FOUNDRY_DEPLOYMENT=__FOUNDRY_DEPLOYMENT__

  - path: /var/log/oracle-workstation-setup.log
    permissions: '0644'
    content: |
      [boot] VM started. Provisioning the schema conversion workstation...

  - path: /usr/local/bin/prog
    permissions: '0755'
    content: |
      #!/usr/bin/env bash
      # Append a timestamped progress line to the setup log.
      echo "[$(date '+%H:%M:%S')] $*" | tee -a /var/log/oracle-workstation-setup.log

  - path: /usr/local/bin/workstation-status
    permissions: '0755'
    content: |
      #!/usr/bin/env bash
      # Follow setup progress (run from a terminal in the RDP desktop).
      echo "Tailing setup log (Ctrl-C to stop)..."
      tail -n +1 -f /var/log/oracle-workstation-setup.log &
      TAIL=$!
      until grep -q PROVISION_COMPLETE /var/log/oracle-workstation-setup.log 2>/dev/null; do sleep 2; done
      kill "$TAIL" 2>/dev/null || true
      echo "=== Setup complete. Open VS Code and start the Migration Wizard. ==="

runcmd:
  # --- XFCE desktop + RDP (private, via Bastion) -----------------------------
  - prog "[1/4] Enabling XFCE desktop + RDP for private Bastion access..."
  - echo "xfce4-session" > /home/__ADMIN_USERNAME__/.xsession
  - chown __ADMIN_USERNAME__:__ADMIN_USERNAME__ /home/__ADMIN_USERNAME__/.xsession
  - adduser xrdp ssl-cert || true
  - systemctl enable --now xrdp

  # --- Visual Studio Code (desktop) ------------------------------------------
  - prog "[2/4] Installing Visual Studio Code..."
  - curl -fsSL https://packages.microsoft.com/keys/microsoft.asc | gpg --dearmor -o /usr/share/keyrings/microsoft.gpg
  - echo "deb [arch=amd64,arm64 signed-by=/usr/share/keyrings/microsoft.gpg] https://packages.microsoft.com/repos/code stable main" > /etc/apt/sources.list.d/vscode.list
  - apt-get update && apt-get install -y code

  # --- PostgreSQL extension + GitHub Copilot ---------------------------------
  - prog "[3/4] Installing the PostgreSQL extension and GitHub Copilot..."
  - sudo -u __ADMIN_USERNAME__ -H code --install-extension ms-ossdata.vscode-pgsql || true
  - sudo -u __ADMIN_USERNAME__ -H code --install-extension github.copilot || true
  - sudo -u __ADMIN_USERNAME__ -H code --install-extension github.copilot-chat || true

  # --- Oracle Instant Client 21 (thick client mode) --------------------------
  - prog "[4/4] Installing Oracle Instant Client 21 (thick client mode)..."
  - mkdir -p /opt/oracle && cd /opt/oracle
  - curl -fsSLo basic.zip https://download.oracle.com/otn_software/linux/instantclient/2113000/instantclient-basic-linux.x64-21.13.0.0.0dbru.zip
  - unzip -oq basic.zip
  - echo /opt/oracle/instantclient_21_13 > /etc/ld.so.conf.d/oracle.conf && ldconfig
  - ln -sf /usr/lib/x86_64-linux-gnu/libaio.so.1t64 /usr/lib/x86_64-linux-gnu/libaio.so.1 || true

  # --- Azure CLI (Microsoft Entra ID sign-in for Foundry / target DB) --------
  - curl -sL https://aka.ms/InstallAzureCLIDeb | bash

  - prog "PROVISION_COMPLETE — VS Code + PostgreSQL extension ready."
  - echo "=== Setup complete ==="
  - echo "Connect: az network bastion tunnel ... --resource-port 3389 --port 13389, then RDP to localhost:13389"
  - echo "Then open VS Code, select the PostgreSQL extension, and start the Migration Wizard."
